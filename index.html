<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAD Viewer (STL / OBJ)</title>
  </head>
  <body>
    <div id="app">
      <header class="top-bar">
        <h1>CAD Viewer</h1>
        <p>上傳並檢視 STL / OBJ 模型</p>
      </header>

      <section class="controls">
        <label for="fileInput" class="upload-btn">選擇檔案</label>
        <input id="fileInput" type="file" accept=".stl,.obj" multiple />
        <span id="fileName" class="file-name">尚未選擇檔案</span>
      </section>

      <section class="viewer-wrap">
        <div class="top-right-tools">
          <div class="icon-toolbar" id="viewToolbar" aria-label="視角切換">
            <button class="icon-btn" type="button" data-view="iso" title="ISO">
              ◇
            </button>
            <button
              class="icon-btn"
              type="button"
              data-view="front"
              title="前視"
            >
              ↑
            </button>
            <button
              class="icon-btn"
              type="button"
              data-view="back"
              title="後視"
            >
              ↓
            </button>
            <button
              class="icon-btn"
              type="button"
              data-view="left"
              title="左視"
            >
              ←
            </button>
            <button
              class="icon-btn"
              type="button"
              data-view="right"
              title="右視"
            >
              →
            </button>
            <button class="icon-btn" type="button" data-view="top" title="上視">
              ⤒
            </button>
            <button
              class="icon-btn"
              type="button"
              data-view="bottom"
              title="下視"
            >
              ⤓
            </button>
          </div>
          <div class="icon-toolbar" aria-label="顯示模式">
            <button
              id="renderSolid"
              class="icon-btn is-active"
              type="button"
              title="網格面"
            >
              ◼
            </button>
            <button
              id="renderWire"
              class="icon-btn"
              type="button"
              title="網格線"
            >
              #
            </button>
            <button
              id="detectBoundaryBtn"
              class="action-btn"
              type="button"
              title="自動辨識牙齒牙齦交界"
            >
              交界辨識
            </button>
          </div>
        </div>

        <aside class="section-panel">
          <div class="panel-title">剖面</div>
          <label for="sectionStep">Step</label>
          <input
            id="sectionStep"
            type="number"
            min="0.1"
            step="0.1"
            value="1"
          />
          <label class="fill-toggle" for="sectionFillToggle">
            <input id="sectionFillToggle" type="checkbox" checked />
            顯示剖面框線
          </label>
          <input id="sectionFillColor" type="color" value="#f97316" />
          <label for="boundarySensitivity">交界靈敏度</label>
          <div class="sensitivity-row">
            <input
              id="boundarySensitivity"
              type="range"
              min="1"
              max="100"
              step="1"
              value="60"
            />
            <span id="boundarySensitivityValue">60</span>
          </div>

          <label>平台尺寸 (X × Y)</label>
          <div class="size-grid">
            <input
              id="platformWidth"
              type="number"
              min="1"
              step="0.1"
              value="192"
            />
            <input
              id="platformHeight"
              type="number"
              min="1"
              step="0.1"
              value="120"
            />
          </div>

          <label>輸出解析度 (W × H)</label>
          <div class="size-grid">
            <input
              id="exportWidth"
              type="number"
              min="128"
              step="1"
              value="2560"
            />
            <input
              id="exportHeight"
              type="number"
              min="128"
              step="1"
              value="1600"
            />
          </div>

          <div id="sectionValue" class="section-value">Z: 0</div>
          <div class="section-slider-wrap">
            <input
              id="sectionSlider"
              class="section-slider"
              type="range"
              min="0"
              max="0"
              step="1"
              value="0"
            />
          </div>
        </aside>

        <aside class="info-card">
          <div class="panel-title">模型資訊</div>
          <div id="modelInfo" class="model-info">
            <div>檔案：未選取</div>
            <div>點數：-</div>
            <div>網格數：-</div>
          </div>
        </aside>

        <canvas id="viewerCanvas"></canvas>

        <button
          id="enterSlicePreviewBtn"
          class="slice-preview-entry-btn"
          type="button"
          title="切換到切層預覽模式"
        >
          切層
        </button>

        <div id="slicePreviewOverlay" class="slice-preview-overlay is-hidden">
          <canvas id="slicePreviewCanvas" class="slice-preview-canvas"></canvas>
          <aside class="slice-preview-side">
            <div class="panel-title">切層預覽</div>
            <div id="previewZValue" class="section-value">Z: 0</div>
            <input
              id="previewZSlider"
              class="section-slider"
              type="range"
              min="0"
              max="0"
              step="1"
              value="0"
            />
            <div id="previewPerfText" class="preview-perf">計算：- ms</div>
          </aside>

          <div class="slice-preview-actions">
            <button id="previewBackBtn" class="action-btn" type="button">
              返回
            </button>
            <button id="previewExportBtn" class="action-btn" type="button">
              輸出
            </button>
          </div>
        </div>

        <div id="hint" class="hint">
          可拖拉 STL/OBJ 到此上傳｜右鍵旋轉、中鍵平移、滾輪縮放、左鍵選取
        </div>
      </section>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
