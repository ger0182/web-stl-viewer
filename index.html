<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAD Viewer (STL / OBJ)</title>
  </head>
  <body>
    <div id="app">
      <header class="top-bar">
        <h1>CAD Viewer</h1>
        <p>上傳並檢視 STL / OBJ 模型</p>
      </header>

      <section class="controls">
        <label for="fileInput" class="upload-btn">選擇檔案</label>
        <input id="fileInput" type="file" accept=".stl,.obj" multiple />
        <span id="fileName" class="file-name">尚未選擇檔案</span>
      </section>

      <section class="viewer-wrap">
        <aside class="left-panel">
          <div class="panel-title">顯示模式</div>
          <button id="renderSolid" class="tool-btn is-active" type="button">
            網格面
          </button>
          <button id="renderWire" class="tool-btn" type="button">網格線</button>
        </aside>

        <div class="view-toolbar" id="viewToolbar">
          <button class="tool-btn" type="button" data-view="iso">ISO</button>
          <button class="tool-btn" type="button" data-view="front">前</button>
          <button class="tool-btn" type="button" data-view="back">後</button>
          <button class="tool-btn" type="button" data-view="left">左</button>
          <button class="tool-btn" type="button" data-view="right">右</button>
          <button class="tool-btn" type="button" data-view="top">上</button>
          <button class="tool-btn" type="button" data-view="bottom">下</button>
        </div>

        <aside class="right-panel">
          <div class="panel-title">模型資訊</div>
          <div id="modelInfo" class="model-info">
            <div>檔案：未選取</div>
            <div>點數：-</div>
            <div>網格數：-</div>
          </div>
        </aside>

        <canvas id="viewerCanvas"></canvas>
        <div id="hint" class="hint">
          可拖拉 STL/OBJ 到此上傳｜右鍵旋轉、中鍵平移、滾輪縮放、左鍵選取
        </div>
      </section>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
